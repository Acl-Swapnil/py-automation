name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install browsers
        run: python -m playwright install --with-deps

      - name: Run Day 7 Tests (HTML & Allure)
        run: |
          cd Day7
          python -m pytest tests/ -v --html=report.html --self-contained-html --alluredir=allure-results

      - name: Upload Standard HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: Day7/report.html
          retention-days: 14

      - name: Upload Raw Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: Day7/allure-results
          retention-days: 14
