name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-html allure-pytest

      - name: Install browsers
        run: python -m playwright install --with-deps

      - name: Run Day 7 Tests (HTML & Allure Raw Results)
        run: |
          cd Day7
          python -m pytest tests/ -v --html=report.html --self-contained-html --alluredir=allure-results

      - name: Setup Java (Required for Allure CLI)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure CLI & Compile Interactive Report Dashboard
        if: always()
        run: |
          cd Day7
          npm install -g allure-commandline --save-dev
          allure generate allure-results --clean -o allure-report --single-file

      - name: Upload Standard HTML Report (Standalone File)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-html-report
          path: Day7/report.html
          retention-days: 14

      - name: Upload Interactive Allure Report (Dashboard Folder)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-dashboard
          path: Day7/allure-report
          retention-days: 14
